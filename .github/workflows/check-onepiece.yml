name: Check One Piece chapter

on:
  workflow_dispatch:
  schedule:
    - cron: "2/5 * * * *"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_BASE_URL: https://ntfy.sh
          FORCE_TEST_NOTIFY: "0"
        run: python checker.py

      - name: Commit updated state if changed
        run: |
          if [ -z "$(git status --porcelain -- state/latest.json)" ]; then
            echo "No state change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/latest.json
          git commit -m "Update latest chapter state"
          git push